x-validation-rules:
  - No duplicate keys in sections or fields.
  - select/multiselect/radio fields must define optionsSource.
  - optionsSource.domainKey must exist in Data Management.
  - Workflow graph must have one start step and at least one terminal path.
  - Transition logic must be deterministic when conditional branches exist.
  - Referenced roles and formTemplateKey values must exist.
